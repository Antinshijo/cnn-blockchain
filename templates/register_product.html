<!DOCTYPE html>
<html>
<head>
<title>AI Product Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
color:white;
overflow-x:hidden;
padding:20px;
}

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background-image:
linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
background-size:60px 60px;
animation:gridMove 25s linear infinite;
z-index:-1;
}

@keyframes gridMove{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

.main-ui{
width:100%;
max-width:420px;
text-align:center;
z-index:5;
}

h1{
font-size:30px;
margin-bottom:10px;
color:#00e5ff;
}

.slogan{
opacity:0.7;
margin-bottom:25px;
}

input{
width:100%;
padding:13px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
}

.file-box{
background:rgba(255,255,255,0.08);
border:1px dashed #00e5ff;
padding:15px;
border-radius:10px;
margin:15px 0;
}

.preview-area{
display:none;
margin-top:15px;
}

.crop-box{
position:relative;
width:100%;
height:260px;
overflow:hidden;
border:2px solid #00e5ff;
border-radius:12px;
background:#000;
}

.crop-box img{
width:100%;
height:100%;
object-fit:cover;
}

.scan-frame{
position:absolute;
top:10%;
left:8%;
width:84%;
height:80%;
border:3px solid #00ff88;
box-shadow:0 0 0 9999px rgba(0,0,0,0.45);
border-radius:12px;
pointer-events:none;
}

.note{
font-size:13px;
opacity:0.8;
margin-top:8px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00e5ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
margin-top:12px;
}

button:hover{
box-shadow:0 0 20px #00e5ff;
}

.back{
display:block;
margin-top:25px;
color:#aaa;
text-decoration:none;
}

.back:hover{
color:white;
}
</style>
</head>

<body>

<div class="main-ui">

<h1>AI Product Registration</h1>

<p class="slogan">
Secure your products using AI + Blockchain Technology
</p>

<form method="POST" enctype="multipart/form-data" id="registerForm">

<input 
type="text"
name="product_name"
placeholder="Product Name"
required>

<input 
type="text"
name="product_id"
placeholder="Product ID"
required>

<div class="file-box">
<input 
type="file"
id="productImage"
name="product_image"
accept="image/*"
required>

<p class="note">
Choose Camera or Gallery. Align only the product inside green box.
</p>
</div>

<div class="preview-area" id="previewArea">
<div class="crop-box">
<img id="previewImage">
<div class="scan-frame"></div>
</div>
<p class="note">
Product mattum green box inside varanum.
</p>
</div>

<button type="submit">
Register Product
</button>

</form>

<a class="back" href="/dashboard">
← Back to Dashboards
</a>

</div>

<script>
const productImage = document.getElementById("productImage");
const previewArea = document.getElementById("previewArea");
const previewImage = document.getElementById("previewImage");

productImage.addEventListener("change", function(){

    const file = this.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            previewImage.src = e.target.result;
            previewArea.style.display = "block";
        }

        reader.readAsDataURL(file);
    }

});
</script>

</body>
</html>

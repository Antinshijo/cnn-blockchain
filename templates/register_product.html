<!DOCTYPE html>
<html>

<head>
<title>AI Product Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
color:white;
overflow:hidden;
}

/* CYBER GRID BACKGROUND */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:
linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
background-size:60px 60px;
animation:gridMove 25s linear infinite;
}

@keyframes gridMove{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

/* FLOATING ROBOTS */

.robot{
position:absolute;
font-size:35px;
opacity:0.12;
animation:floatRobot 18s infinite linear;
}

.robot:nth-child(1){top:10%;left:5%}
.robot:nth-child(2){top:70%;left:10%}
.robot:nth-child(3){top:30%;right:10%}
.robot:nth-child(4){bottom:10%;right:5%}

@keyframes floatRobot{

0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}

}

/* PARTICLES */

.particle{
position:absolute;
width:4px;
height:4px;
background:#00ffff;
border-radius:50%;
opacity:0.6;
animation:particleMove 10s linear infinite;
}

@keyframes particleMove{

0%{
transform:translateY(0);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-600px);
opacity:0;
}

}

/* MAIN UI */

.main-ui{
text-align:center;
z-index:5;
animation:fadeIn 1.2s ease;
}

/* TITLE */

h1{
font-size:36px;
margin-bottom:10px;
}

/* SLOGAN */

.slogan{
opacity:0.7;
margin-bottom:30px;
}

/* INPUT */

input{
width:260px;
padding:12px;
margin:10px;
border:none;
border-radius:6px;
outline:none;
font-size:14px;
}

/* BUTTON */

button{
padding:12px 25px;
border:none;
border-radius:6px;
background:linear-gradient(45deg,#00e5ff,#0072ff);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 20px #00e5ff;
}

/* BACK BUTTON */

.back{
display:block;
margin-top:25px;
color:#aaa;
text-decoration:none;
}

.back:hover{
color:white;
}

/* ANIMATION */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:500px){

h1{
font-size:26px;
}

input{
width:90%;
}

}

</style>

</head>

<body>

<div class="robot">🤖</div>
<div class="robot">🤖</div>
<div class="robot">🤖</div>
<div class="robot">🤖</div>
<div class="robot">🤖</div>
<div class="robot">🤖</div>
<div class="robot">🤖</div>
<div class="robot">🤖</div>

<div class="particle" style="left:20%;animation-delay:0s"></div>
<div class="particle" style="left:40%;animation-delay:2s"></div>
<div class="particle" style="left:60%;animation-delay:4s"></div>
<div class="particle" style="left:80%;animation-delay:6s"></div>

<div class="main-ui">

<h1>AI Product Registration</h1>

<p class="slogan">
Secure your products using AI + Blockchain Technology
</p>

<form method="POST" enctype="multipart/form-data">

<input 
type="text"
name="product_name"
placeholder="Product Name"
required>

<br>

<input 
type="text"
name="product_id"
placeholder="Product ID"
required>

<br>

<input 
type="file"
name="product_image"
accept="image/*"
capture="environment"
required>

<br>

<button type="submit">
Register Product
</button>

</form>

<a class="back" href="/dashboard">
← Back to Dashboard
</a>

</div>

</body>

</html>

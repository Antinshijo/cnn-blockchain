<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{
  height:100vh;
  background: radial-gradient(circle at center,#0f2027,#203a43,#2c5364);
  overflow:hidden;
  color:#0ff;
}
.container{
  position:relative;
  z-index:2;
  width:400px;
  margin:auto;
  top:50%;
  transform:translateY(-50%);
  padding:30px;
  border-radius:15px;
  background:rgba(0,0,0,0.7);
  box-shadow:0 0 20px #0ff;
}
.tabs{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}
.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:transparent;
  color:#0ff;
  cursor:pointer;
  border-bottom:2px solid transparent;
}
.tabs button.active{border-color:#0ff}
.form{display:none}
.form.active{display:block}
input,select{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:black;
  border:1px solid #0ff;
  color:#0ff;
}
button.submit{
  width:100%;
  padding:10px;
  background:#0ff;
  border:none;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
.social{
  margin-top:15px;
}
.social button{
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  cursor:pointer;
}
.google{background:#db4437;color:white}
.apple{background:black;color:white;border:1px solid white}
/* Floating Icons */
.icon{
  position:absolute;
  width:40px;
  animation:float 6s infinite ease-in-out;
  opacity:0.7;
}
@keyframes float{
  0%{transform:translateY(0px)}
  50%{transform:translateY(-20px)}
  100%{transform:translateY(0px)}
}
</style>
</head>
<body>

<!-- Floating Icons -->
<img src="https://cdn-icons-png.flaticon.com/512/2091/2091665.png" class="icon" style="top:10%;left:10%">
<img src="https://cdn-icons-png.flaticon.com/512/2721/2721291.png" class="icon" style="top:20%;left:80%">
<img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" class="icon" style="top:70%;left:15%">
<img src="https://cdn-icons-png.flaticon.com/512/906/906175.png" class="icon" style="top:80%;left:70%">
<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" class="icon" style="top:50%;left:50%">
<img src="https://cdn-icons-png.flaticon.com/512/2942/2942813.png" class="icon" style="top:30%;left:40%">
<img src="https://cdn-icons-png.flaticon.com/512/1533/1533913.png" class="icon" style="top:60%;left:80%">

<div class="container">
  <div class="tabs">
    <button id="loginTab" class="active">Sign In</button>
    <button id="registerTab">Register</button>
  </div>

  <!-- Login -->
  <div id="loginForm" class="form active">
    <select>
      <option>Select Role</option>
      <option>Stakeholder</option>
      <option>Customer</option>
      <option>Receiver</option>
    </select>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="submit">Login</button>

    <div class="social">
      <button class="google" onclick="googleSignIn()">Sign in with Google</button>
      <button class="apple">Sign in with Apple</button>
    </div>
  </div>

  <!-- Register -->
  <div id="registerForm" class="form">
    <select>
      <option>Select Role</option>
      <option>Stakeholder</option>
      <option>Customer</option>
      <option>Receiver</option>
    </select>
    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="submit">Register</button>

    <div class="social">
      <button class="google" onclick="googleSignIn()">Sign up with Google</button>
      <button class="apple">Sign up with Apple</button>
    </div>
  </div>
</div>

<script>
// Tab switch
const loginTab = document.getElementById('loginTab');
const registerTab = document.getElementById('registerTab');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');

loginTab.onclick = () => {
  loginTab.classList.add('active');
  registerTab.classList.remove('active');
  loginForm.classList.add('active');
  registerForm.classList.remove('active');
};

registerTab.onclick = () => {
  registerTab.classList.add('active');
  loginTab.classList.remove('active');
  registerForm.classList.add('active');
  loginForm.classList.remove('active');
};

// Google Auth (Real Implementation Required Backend)
function googleSignIn(){
  alert("Integrate Firebase or OAuth 2.0 for real Google Sign-In");
}
</script>

</body>
</html>

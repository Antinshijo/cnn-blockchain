<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
  font-family:Arial, sans-serif;
}

.box{
  background:white;
  width:350px;
  padding:30px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
  margin-top:0;
  color:#222;
}

a{
  color:#667eea;
  text-decoration:none;
  font-weight:bold;
}

a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login Page</h2>
  <a href="/dashboard">Go to Dashboard</a>
</div>

</body>
</html>
